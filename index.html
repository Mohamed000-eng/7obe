<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى رحمة - عيد فطر سعيد</title>
    <style>
        :root {
            --dark-red: #8b0000;
            --bright-red: #ff0000;
            --pink: #ff69b4;
            --light-pink: #ffb6c1;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: black;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        #stage1 { position: relative; width: 100%; height: 100%; }
        canvas { display: block; }

        /* تنسيق العد التنازلي والجمل الإنجليزية - نفس اللون والمركز */
        .overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--light-pink);
            font-weight: bold;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.8);
        }

        #countdown { font-size: 150px; display: none; }
        
        #eng-messages { 
            font-size: clamp(30px, 8vw, 55px); 
            width: 90%; 
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* المرحلة الثالثة (المستطيل والرسائل العربية) */
        #stage3 {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: none;
            z-index: 30;
        }

        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite; }
        
        #white-box {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; height: 55%;
            background: white; border-radius: 20px;
            display: flex; justify-content: center; align-items: center;
            text-align: center; padding: 20px; box-sizing: border-box;
        }

        #emoji-corner { position: absolute; top: 15px; left: 15px; font-size: 35px; }
        #arabic-messages { color: var(--dark-red); font-size: 24px; font-weight: bold; }

        .rising-heart { position: absolute; bottom: -50px; font-size: 25px; animation: rise 4s linear forwards; }

        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes rise { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100vh); opacity: 0; } }
    </style>
</head>
<body>

    <div id="stage1">
        <canvas id="matrix"></canvas>
        <div id="countdown" class="overlay-text">3</div>
        <div id="eng-messages" class="overlay-text"></div>
    </div>

    <div id="stage3">
        <div id="stars-container"></div>
        <div id="white-box">
            <div id="emoji-corner">💞</div>
            <div id="arabic-messages"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        const countdownEl = document.getElementById('countdown');
        const engMsgEl = document.getElementById('eng-messages');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = "LOVE";
        const colors = ['#8b0000', '#ff0000', '#ff69b4', '#ffb6c1'];
        const fontSize = 22;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(0);
        
        let matrixActive = true;
        let countdownTriggered = false;

        function drawMatrix() {
            if(!matrixActive) return;
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                ctx.font = fontSize + "px Arial";
                
                if (Math.random() > 0.95 || drops[i] > 0) {
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    drops[i]++;
                }

                if (drops[i] * fontSize > canvas.height / 2 && !countdownTriggered) {
                    startSequence();
                }

                if (drops[i] * fontSize > canvas.height) {
                    drops[i] = 0;
                }
            }
            requestAnimationFrame(drawMatrix);
        }

        function startSequence() {
            countdownTriggered = true;
            countdownEl.style.display = 'block';
            let count = 3;
            
            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.innerText = count;
                } else {
                    clearInterval(timer);
                    countdownEl.style.display = 'none';
                    showEnglishPhrases();
                }
            }, 1000);
        }

        function showEnglishPhrases() {
            const phrases = [
                "Happy", 
                "Eid Al-Fitr", 
                "may you always be with me, Roro"
            ];
            let i = 0;
            engMsgEl.style.display = 'block';

            function next() {
                if (i < phrases.length) {
                    engMsgEl.innerText = phrases[i];
                    engMsgEl.style.opacity = 1;
                    
                    setTimeout(() => {
                        engMsgEl.style.opacity = 0;
                        setTimeout(() => {
                            i++;
                            next();
                        }, 800);
                    }, 2500);
                } else {
                    // بعد انتهاء الإنجليزية، ننتقل للمرحلة الثالثة
                    setTimeout(transitionToStage3, 1000);
                }
            }
            next();
        }

        function transitionToStage3() {
            matrixActive = false;
            document.getElementById('stage1').style.display = 'none';
            document.getElementById('stage3').style.display = 'block';
            createStars();
            startRisingHearts();
            showArabicMessages();
        }

        // --- دوام المرحلة الثالثة (النجوم، القلوب، الرسائل العربية) ---
        function createStars() {
            const container = document.getElementById('stars-container');
            for(let i=0; i<120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = Math.random() * 2 + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                container.appendChild(star);
            }
        }

        function startRisingHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'rising-heart';
                heart.innerHTML = '💖';
                heart.style.left = Math.random() * 100 + '%';
                document.getElementById('stage3').appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 600);
        }

        function showArabicMessages() {
            const msgs = [
                "أحلى عيد فطر ليا هو اللي بكون فيه وإنتي جنبي 💙",
                "كل عيد فطر وإنتي دايمًا بخير وسعادة وراحة بال",
                "وجودك في حياتي هو العيد الحقيقي بالنسبالي",
                "بتمنى من ربنا إننا نفضل مع بعض كل عيد وسنين كتير جاية",
                "ضحكتك في العيد بتخلي الدنيا كلها ألوان",
                "كل سنة وإنتي أقرب حد لقلبي وأجمل حاجة حصلتلي",
                "العيد بيبقى له طعم تاني خالص لما بكون معاكي",
                "كل لحظة في العيد وإنتي فيها بتبقى ذكرى حلوة في قلبي",
                "نفسي كل أعيادي الجاية تكون وإنتي فيها زي دلوقتي وأحلى",
                "وجودك جنبي بيخليني أحس إن العيد فعلاً عيد",
                "إنتي السبب في إن أي يوم عادي عندي يبقى عيد",
                "ربنا يديمك في حياتي ويخلي كل عيد وإنتي معايا"
            ];
            let i = 0;
            const container = document.getElementById('arabic-messages');
            function nextMsg() {
                if (i < msgs.length) {
                    container.style.opacity = 0;
                    setTimeout(() => {
                        container.innerText = msgs[i];
                        container.style.transition = "opacity 1s";
                        container.style.opacity = 1;
                        i++;
                        setTimeout(nextMsg, 4000);
                    }, 1000);
                }
            }
            nextMsg();
        }

        drawMatrix();
    </script>
</body>
</html>
